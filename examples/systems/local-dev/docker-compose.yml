name: ${COMPOSE_PROJECT_NAME:-locallink_local_dev}

# LocalLink sample Docker topology for the local-dev system fixture.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: locallink
      POSTGRES_USER: locallink
      POSTGRES_PASSWORD: locallink
    ports:
      - "${POSTGRES_PORT}:5432"
    labels:
      locallink.name: Postgres Compose
      locallink.group: docker
      locallink.runtime: docker
      locallink.downstream: Queue Worker
      locallink.envVars: POSTGRES_PORT
      locallink.docsUrl: https://hub.docker.com/_/postgres
      locallink.notes: Persistent state for local services.
      locallink.detail: Keeps database dependencies visible without leaving the local workspace.
      locallink.tags: docker,db,stable
      locallink.portEnv: POSTGRES_PORT
